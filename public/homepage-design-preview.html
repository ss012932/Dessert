<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KASANE 菓｜首頁設計預覽</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #e8e3d8;
      font-family: Arial, sans-serif;
      color: #2f2a24;
    }

    .preview-note {
      max-width: 1100px;
      margin: 0 auto 24px auto;
      line-height: 1.8;
    }

    .preview-note h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-family: Georgia, serif;
      letter-spacing: 1px;
    }

    .preview-note p {
      margin: 0;
      color: #756f66;
      font-size: 15px;
    }

    .mockup-frame {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      border-radius: 28px;
      overflow: hidden;
      background: #f7f5ef;
      box-shadow: 0 30px 80px rgba(47, 42, 36, 0.22);
    }

    .mockup-frame img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="preview-note">
    <h1>KASANE 菓｜首頁設計預覽</h1>
    <p>這是首頁視覺設計稿，先用抽象甜點圖形表示照片位置。正式開發時會改成 app/assets/pic 裡的實際甜點照片。</p>
  </div>

  <div class="mockup-frame">
    <img src="/homepage-design-mockup.svg" alt="KASANE 菓首頁設計預覽" />
  </div>
</body>
</html>
